<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriAssist - Login</title>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card card">
            <div class="login-header text-center">
                <i class="fa-solid fa-leaf logo-icon"></i>
                <h1 class="logo-title" style="margin-top: 0.5rem; font-size: 1.5rem;">AgriAssist</h1>
                <p class="tagline">Your Multilingual AI Farming Companion</p>
            </div>
            
            <form id="login-form" class="login-form" style="margin-top: 2.5rem;">
                <div class="input-group">
                    <label for="user-name">Full Name <span class="text-danger">*</span></label>
                    <input type="text" id="user-name" placeholder="Enter your full name" required>
                </div>
                
                <div class="input-group">
                    <label for="user-phone">Phone Number <span class="text-danger">*</span></label>
                    <input type="tel" id="user-phone" placeholder="Enter your 10-digit phone number" pattern="[0-9]{10}" required>
                </div>
                
                <div class="input-group">
                    <label for="user-lang">Preferred Language <span class="text-danger">*</span></label>
                    <select id="user-lang" required>
                        <option value="" disabled selected>Select Language...</option>
                        <option value="ENG">English</option>
                        <option value="TEL">Telugu (తెలుగు)</option>
                        <option value="HIN">Hindi (हिंदी)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-primary w-full" style="margin-top: 1rem; font-size: 1.1rem; padding: 1rem;">
                    Enter Dashboard <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
            <div class="text-center" style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-secondary);">
                By entering, you agree to receive agricultural advice based on modern farming practices.
            </div>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
